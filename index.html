<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WVM Informatiescherm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="logo.png" class="logo" alt="Watervrienden Maastricht">

    <div id="page-agenda" class="page active">
        <h1 class="title">Watervrienden<br>Maastricht</h1>
        <div id="agenda-content"></div>
    </div>

    <div id="page-rooster" class="page">
        <h1 class="title" style="font-size: 80px; margin-top: -60px;">Lesrooster</h1>
        <div class="rooster-container">
            <div class="column">
                <h2>Zorgbad:</h2>
                <div id="rooster-zorgbad"></div>
            </div>
            <div class="column">
                <h2>Wedstrijdbad:</h2>
                <div id="rooster-wedstrijdbad"></div>
            </div>
        </div>
    </div>

    <div id="page-announcement" class="page">
        <div class="announcement-container">
            <div class="ann-header">Mededeling</div>
            <div id="announcement-text" class="ann-text"></div>
        </div>
    </div>

    <div id="klok-container" class="klok">00:00:00</div>

    <script type="module" src="script.js"></script>
</body>
</html>
