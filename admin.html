<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WVM Beheer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
    <div class="admin-container">
        <!-- Inlogscherm -->
        <div id="login-form" class="admin-section">
            <h2>WVM Beheer Inloggen</h2>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Wachtwoord">
            <button id="btn-login" class="main-btn">Inloggen</button>
        </div>

        <!-- Beheerpaneel -->
        <div id="admin-content">
            <div class="admin-section">
                <h2>Agenda Toevoegen</h2>
                <input type="date" id="ag-datum">
                <input type="text" id="ag-titel" placeholder="Titel">
                <input type="text" id="ag-onderwerp" placeholder="Onderwerp">
                <button id="btn-save-agenda" class="main-btn">Toevoegen</button>
            </div>

            <div class="admin-section">
                <h2>Huidige Agenda</h2>
                <div id="admin-agenda-list"></div>
            </div>

            <div class="admin-section">
                <h2>Mededeling</h2>
                <textarea id="med-tekst" rows="3"></textarea>
                <button id="btn-save-med" class="main-btn">Opslaan</button>
            </div>

            <div class="admin-section">
                <h2>Rooster</h2>
                <p>Zorgbad:</p>
                <textarea id="rooster-zorg" rows="4"></textarea>
                <p>Wedstrijdbad:</p>
                <textarea id="rooster-wed" rows="4"></textarea>
                <button id="btn-save-rooster" class="main-btn">Rooster Opslaan</button>
            </div>
            
            <button id="btn-logout" style="width:100%; color:red; background:none; border:none; padding:20px; cursor:pointer;">Uitloggen</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
