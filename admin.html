<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>WVM Beheer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
    <h1>WVM Schermbeheer</h1>

    <div class="admin-section">
        <h2>1. Agenda Item Toevoegen</h2>
        <input type="date" id="ag-datum">
        <input type="text" id="ag-titel" placeholder="Bijv: Proefzwemmen">
        <input type="text" id="ag-onderwerp" placeholder="Bijv: Snorkelen & Survival">
        <button id="btn-save-agenda">Voeg toe aan lijst</button>
        <div id="admin-agenda-list" style="margin-top:20px;"></div>
    </div>

    <div class="admin-section">
        <h2>2. Mededeling</h2>
        <textarea id="med-tekst" rows="3" placeholder="Typ hier de belangrijke mededeling..."></textarea>
        <button id="btn-save-med">Mededeling bijwerken</button>
    </div>

    <div class="admin-section">
        <h2>3. Rooster Aanpassen</h2>
        <div style="display:flex; gap:20px;">
            <div style="flex:1;">
                <h3>Zorgbad</h3>
                <textarea id="rooster-zorg" rows="8" placeholder="Eén regel per tijdstip..."></textarea>
            </div>
            <div style="flex:1;">
                <h3>Wedstrijdbad</h3>
                <textarea id="rooster-wed" rows="8" placeholder="Eén regel per tijdstip..."></textarea>
            </div>
        </div>
        <button id="btn-save-rooster">Rooster Opslaan</button>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
