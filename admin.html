<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WVM Beheer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body" id="is-admin-page">
    <div class="admin-container">
        
        <div id="login-form" class="admin-section">
            <h2 style="text-align: center;">WVM Beheer</h2>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Wachtwoord">
            <button id="btn-login" class="main-btn">Inloggen</button>
        </div>

        <div id="admin-content" style="display: none;">
            <div class="admin-section">
                <h2>Schermen beheren</h2>
                <div class="switch-row">
                    <span>Kleine klok (hoek)</span>
                    <label class="switch"><input type="checkbox" id="klok-switch"><span class="slider"></span></label>
                </div>
                <div class="switch-row">
                    <span>Grote klok scherm</span>
                    <label class="switch"><input type="checkbox" id="groot-klok-switch"><span class="slider"></span></label>
                </div>
                <div class="switch-row">
                    <span>Mededeling scherm</span>
                    <label class="switch"><input type="checkbox" id="med-switch"><span class="slider"></span></label>
                </div>
            </div>

            <div class="admin-section">
                <h2>Agenda Item</h2>
                <input type="date" id="ag-datum">
                <input type="text" id="ag-titel" placeholder="Bijv: Proefzwemmen">
                <input type="text" id="ag-onderwerp" placeholder="Bijv: Snorkelen & Survival">
                <button id="btn-save-agenda" class="main-btn">Toevoegen</button>
                <div id="admin-agenda-list" style="margin-top:15px;"></div>
            </div>

            <div class="admin-section">
                <h2>Mededeling Tekst</h2>
                <textarea id="med-tekst" rows="3" placeholder="Typ hier de tekst..."></textarea>
                <button id="btn-save-med" class="main-btn">Tekst Opslaan</button>
            </div>

            <div class="admin-section">
                <h2>Lesrooster</h2>
                <textarea id="rooster-zorg" rows="4" placeholder="Zorgbad..."></textarea>
                <textarea id="rooster-wed" rows="4" placeholder="Wedstrijdbad..."></textarea>
                <button id="btn-save-rooster" class="main-btn">Rooster Opslaan</button>
            </div>
            
            <button id="btn-logout" style="width:100%; color:red; border:none; background:none; padding:10px; cursor:pointer; font-weight:bold;">Uitloggen</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
