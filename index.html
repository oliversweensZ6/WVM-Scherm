<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WVM Informatiescherm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Zorg dat logo.png in je GitHub map staat! -->
    <img src="logo.png" class="logo" alt="Watervrienden Logo">

    <!-- Scherm 1: Agenda -->
    <div id="page-agenda" class="page active">
        <h1 class="title">Watervrienden<br>Maastricht</h1>
        <div id="agenda-content">
            <!-- Hier komt de data uit Firebase -->
        </div>
    </div>

    <!-- Scherm 2: Rooster -->
    <div id="page-rooster" class="page">
        <div class="rooster-container">
            <div class="column">
                <h2>Zorgbad:</h2>
                <div id="rooster-zorgbad"></div>
            </div>
            <div class="column">
                <h2>Wedstrijdbad:</h2>
                <div id="rooster-wedstrijdbad"></div>
            </div>
        </div>
    </div>

    <!-- Scherm 3: Mededeling -->
    <div id="page-announcement" class="page">
        <div class="announcement-container">
            <div class="ann-header">Mededeling</div>
            <div id="announcement-text" class="ann-text"></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
