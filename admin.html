<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WVM Beheer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body" id="is-admin-page">
    <div class="admin-container">
        
        <!-- Login Formulier -->
        <div id="login-form" class="admin-section" style="display: block;">
            <h2 style="text-align: center;">WVM Beheer</h2>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Wachtwoord">
            <button id="btn-login" class="main-btn">Inloggen</button>
        </div>

        <!-- Beheer Content -->
        <div id="admin-content" style="display: none;">
            <div class="admin-section">
                <h2>Klok Switch</h2>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <span>Klok tonen op TV</span>
                    <label class="switch">
                        <input type="checkbox" id="klok-switch">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="admin-section">
                <h2>Agenda Item</h2>
                <input type="date" id="ag-datum">
                <input type="text" id="ag-titel" placeholder="Titel">
                <input type="text" id="ag-onderwerp" placeholder="Onderwerp">
                <button id="btn-save-agenda" class="main-btn">Toevoegen</button>
                <div id="admin-agenda-list" style="margin-top:15px;"></div>
            </div>

            <div class="admin-section">
                <h2>Mededeling</h2>
                <textarea id="med-tekst" rows="3"></textarea>
                <button id="btn-save-med" class="main-btn">Opslaan</button>
            </div>

            <div class="admin-section">
                <h2>Rooster</h2>
                <p>Zorgbad:</p>
                <textarea id="rooster-zorg" rows="4"></textarea>
                <p>Wedstrijdbad:</p>
                <textarea id="rooster-wed" rows="4"></textarea>
                <button id="btn-save-rooster" class="main-btn">Rooster Opslaan</button>
            </div>
            
            <button id="btn-logout" style="width:100%; color:red; border:none; background:none; padding:10px; cursor:pointer; font-weight:bold;">Uitloggen</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
